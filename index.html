<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Costa Rica - Diseño Visual</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="mobile-app-card">
        <header class="header-paisa">
            <div class="header-overlay">
                <div class="flag-circle">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Flag_of_Costa_Rica.svg" alt="CR Flag">
                </div>
                <h1>eSIM Costa Rica</h1>
                <div class="badge-unlimited">
                    <i class="fas fa-bolt"></i>
                    <span>Internet ilimitado en todo el país</span>
                </div>
            </div>
        </header>

        <main class="form-container">
            <div class="section-group">
                <label>Seleccione sus días</label>
                <div class="input-box">
                    <input type="number" id="days" value="7">
                </div>
            </div>

            <div class="section-group">
                <label>¿Cómo desea configurar su eSIM?</label>
                <div class="option-card">
                    <input type="radio" name="config" id="auto" checked>
                    <label for="auto" class="option-content">
                        <i class="fas fa-mobile-alt"></i>
                        <div>
                            <strong>Autoservicio 24/7</strong>
                            <span>Lo hago yo mismo (Digital)</span>
                        </div>
                    </label>
                </div>
                <div class="option-card">
                    <input type="radio" name="config" id="tecnico">
                    <label for="tecnico" class="option-content">
                        <i class="fas fa-user-cog"></i>
                        <div>
                            <strong>Ayuda del Técnico</strong>
                            <span>Configuración en tienda</span>
                        </div>
                    </label>
                </div>
            </div>

            <div class="section-group">
    <label>Forma de Pago</label>
    <div class="payment-grid">
        <div class="pay-method active">
            <i class="fab fa-paypal"></i>
            <span>PayPal</span>
        </div>
        <div class="pay-method">
            <i class="fab fa-apple-pay"></i>
            <span>Apple Pay</span>
        </div>
        <div class="pay-method">
            <i class="fab fa-google-pay"></i>
            <span>Google Pay</span>
        </div>
        <div class="pay-method">
            <i class="fas fa-credit-card"></i>
            <span>Tarjeta</span>
        </div>
    </div>
</div>

<div class="section-group">
    <label>WhatsApp o Correo (para enviar código):</label>
    <div class="input-box">
        <input type="text" id="contact" placeholder="+506 ... o email@test.com">
    </div>
    <p class="input-note">El técnico procederá con la activación física en el local si así lo eliges.</p>
</div>

            <div class="price-tag">
                Total: $49.00
            </div>

            <button class="btn-activar">
                ACTIVAR eSIM
            </button>

            <footer class="service-footer">
                <div class="service-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Conexión Segura</span>
                </div>
                <div class="service-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Activación Instantánea</span>
                </div>
            </footer>
        </main>
    </div>

</body>
</html>
