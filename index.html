<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Costa Rica</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="mobile-app-card">
        
        <header class="header-paisa">
            <div class="language-switcher">
                <span class="lang-opt active">EN</span>
                <span class="lang-opt">ES</span>
                <span class="lang-opt">FR</span>
                <span class="lang-opt">DE</span>
                <span class="lang-opt">NL</span>
            </div>
            <div class="header-overlay">
                <h1>eSIM Costa Rica</h1>
                <div class="badge-unlimited">
                    <i class="fas fa-bolt"></i>
                    <span>Unlimited internet nationwide</span>
                </div>
            </div>
        </header>

        <div class="form-container">
            
            <div class="section-group">
                <label>Select your days</label>
                <div class="input-box">
                    <input type="number" value="7" min="1">
                </div>
            </div>

            <div class="compatibility-box">
                <div class="comp-header">
                    <i class="fas fa-info-circle"></i>
                    <label>Is my phone compatible?</label>
                </div>
                <p>Dial <strong>*#06#</strong> on your phone (as if making a call).</p>
                <p class="comp-step">If an <strong>EID</strong> code appears, your device supports eSIM.</p>
                <div class="no-signal-badge">
                    No signal or internet required to check.
                </div>
            </div>

            <div class="section-group">
                <label>How do you want to set up your eSIM?</label>
                
                <label class="option-card">
                    <input type="radio" name="setup" checked>
                    <div class="option-content">
                        <i class="fas fa-mobile-alt"></i>
                        <div>
                            <strong>24/7 Self-Service</strong>
                            <span>I'll do it myself (Digital)</span>
                        </div>
                    </div>
                </label>

                <label class="option-card">
                    <input type="radio" name="setup">
                    <div class="option-content">
                        <i class="fas fa-user-gear"></i>
                        <div>
                            <strong>Technician Assistance</strong>
                            <span>In-store setup</span>
                        </div>
                    </div>
                </label>
            </div>

            <div class="section-group">
                <label>Payment Method</label>
                <div class="payment-grid">
                    <div class="pay-method">
                        <i class="fab fa-paypal"></i>
                        <span>PayPal</span>
                    </div>
                    <div class="pay-method">
                        <i class="fab fa-apple-pay"></i>
                        <span>Apple Pay</span>
                    </div>
                    <div class="pay-method">
                        <i class="fab fa-google-pay"></i>
                        <span>Google Pay</span>
                    </div>
                    <div class="pay-method">
                        <i class="fas fa-credit-card"></i>
                        <span>Card</span>
                    </div>
                </div>
            </div>

            <div class="section-group">
                <label>WhatsApp or Email (to send code):</label>
                <div class="input-box">
                    <input type="text" placeholder="+506 ... or email@test.com">
                </div>
            </div>

            <div class="price-tag">
                Total: $49.00
            </div>
            
            <button class="btn-activar">ACTIVATE NOW</button>

            <div class="service-footer">
                <div class="service-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Instant Delivery</span>
                </div>
                <div class="service-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure Payment</span>
                </div>
            </div>
        </div>
    </div>

</body>
</html>
