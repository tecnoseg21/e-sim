<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Costa Rica - Monteverde</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.paypal.com/sdk/js?client-id=Ad_S-Xv-u_v9-5_f-3_v-v-v-v-v-v-v-v-v-v-v-v&currency=USD"></script>
</head>
<body>

    <div class="mobile-app-card">
        <header class="header-paisa">
            <div class="language-switcher">
                <span class="lang-opt active">EN</span>
                <span class="lang-opt">ES</span>
                <span class="lang-opt">FR</span>
                <span class="lang-opt">DE</span>
                <span class="lang-opt">NL</span>
            </div>
            <div class="header-overlay">
                <h1>eSIM Costa Rica</h1>
                <div class="badge-unlimited">
                    <i class="fas fa-bolt"></i>
                    <span>Unlimited internet nationwide</span>
                </div>
            </div>
        </header>

        <div class="form-container">
            <div class="section-group">
                <label>Select your travel dates</label>
                <div class="date-range-container" style="display: flex; gap: 10px;">
                    <div class="input-box" style="flex: 1;">
                        <small>Start Date</small>
                        <input type="date" id="fecha-inicio">
                    </div>
                    <div class="input-box" style="flex: 1;">
                        <small>End Date</small>
                        <input type="date" id="fecha-fin">
                    </div>
                </div>
                <div id="resumen-dias">
                    Total: <span id="contador-dias">0</span> days
                </div>
            </div>

            <div class="compatibility-box">
                <div class="comp-header">
                    <i class="fas fa-info-circle"></i>
                    <label>Is my phone compatible?</label>
                </div>
                <p>Dial <strong>*#06#</strong> on your phone.</p>
                <p class="comp-step">If an <strong>EID</strong> code appears, you're ready.</p>
            </div>

            <div class="section-group">
                <label>Set up preference</label>
                <label class="option-card">
                    <input type="radio" name="setup" value="Self" checked>
                    <div class="option-content">
                        <i class="fas fa-mobile-alt"></i>
                        <div><strong>24/7 Self-Service</strong><span>Digital delivery</span></div>
                    </div>
                </label>
                <label class="option-card">
                    <input type="radio" name="setup" value="Tech">
                    <div class="option-content">
                        <i class="fas fa-user-gear"></i>
                        <div><strong>Technician Help</strong><span>In-store setup</span></div>
                    </div>
                </label>
            </div>

            <div class="section-group">
                <label>Payment Method</label>
                <div class="payment-grid" id="payment-options">
                    <div class="pay-method" data-method="PayPal"><i class="fab fa-paypal"></i><span>PayPal</span></div>
                    <div class="pay-method" data-method="Card"><i class="fas fa-credit-card"></i><span>Card</span></div>
                </div>
            </div>

            <div class="section-group">
                <label id="label-contacto">WhatsApp or Email (for activation code):</label>
                <div class="input-box">
                    <input type="text" id="contacto-cliente" placeholder="+506... or email@test.com">
                </div>
            </div>

            <div class="price-tag" id="display-precio">Total: $0.00</div>
            
            <div id="paypal-button-container"></div>
            
            <button class="btn-activar" id="btn-validar">CHECKOUT</button>

            <div class="service-footer">
                <div class="service-item"><i class="fas fa-check-circle"></i><span>Instant Delivery</span></div>
                <div class="service-item"><i class="fas fa-shield-alt"></i><span>Secure Payment</span></div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
