<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Costa Rica - Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.paypal.com/sdk/js?client-id=Adk_bp6_mlm6_gz2j1KU6VJMQKTNhJrTsI9DL5fAwAeLDvxM3wD7DdKQHfniB1pKdQhRvUryjwldMyMV&currency=USD&components=buttons,applepay"></script>
</head>
<body>

    <div class="mobile-app-card">
        <header class="header-paisa">
            <div class="language-switcher">
                <span class="lang-opt active" data-lang="EN">EN</span>
                <span class="lang-opt" data-lang="ES">ES</span>
                <span class="lang-opt" data-lang="FR">FR</span>
                <span class="lang-opt" data-lang="DE">DE</span>
                <span class="lang-opt" data-lang="NL">NL</span>
                <header class="header-paisa"> ... </header>
        <div class="form-container"> ... </div>

        <img src="perezoso-izq.png" class="perezoso-interno sl-izq" alt="perezoso">
        <img src="perezoso-der.png" class="perezoso-interno sl-der" alt="perezoso">
            </div>
            <div class="header-overlay">
                <h1 id="main-title">eSIM Costa Rica</h1>
                <div class="badge-unlimited">
                    <i class="fas fa-bolt"></i>
                    <span id="badge-text">Unlimited internet nationwide</span>
                </div>
            </div>
        </header>

        <div class="form-container">
            <div class="section-group">
                <label id="label-dates">Select your travel dates</label>
                <div class="date-range-container" style="display: flex; gap: 10px;">
                    <div class="input-box" style="flex: 1;">
                        <small id="label-start" style="display:block; font-size: 0.7rem; color: #1976d2; font-weight: bold;">Start Date</small>
                        <input type="date" id="fecha-inicio">
                    </div>
                    <div class="input-box" style="flex: 1;">
                        <small id="label-end" style="display:block; font-size: 0.7rem; color: #1976d2; font-weight: bold;">End Date</small>
                        <input type="date" id="fecha-fin">
                    </div>
                </div>
                <div id="resumen-dias" style="margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #1976d2;">
                    <span id="txt-total-days">Total:</span> <span id="contador-dias">0</span> <span id="txt-days-unit">days</span>
                </div>
            </div>

            <div class="compatibility-box">
                <div class="comp-header">
                    <i class="fas fa-info-circle"></i>
                    <label id="label-comp">Is my phone compatible?</label>
                </div>
                <p id="comp-p1">Dial <strong>*#06#</strong> on your phone.</p>
                <p class="comp-step" id="comp-p2">If an <strong>EID</strong> code appears, you're ready.</p>
            </div>

            <div class="section-group">
                <label id="label-contacto">WhatsApp or Email (for activation code):</label>
                <div class="input-box">
                    <input type="text" id="contacto-cliente" placeholder="+506 ... or email@test.com">
                </div>
            </div>

            <div id="payment-area" style="display: none;">
                <div class="price-tag" id="display-precio" style="margin-bottom: 12px; padding: 18px; text-align: center; border-radius: 12px;">
                    </div>
                <div id="paypal-button-container"></div>
            </div>
            
            <div id="action-area">
                <button class="btn-activar" id="btn-validar">CHECKOUT</button>
            </div>

            <div class="service-footer">
                <div class="service-item">
                    <i class="fas fa-check-circle"></i>
                    <span id="footer-1">Instant Delivery</span>
                </div>
                <div class="service-item">
                    <i class="fas fa-shield-alt"></i>
                    <span id="footer-2">Secure Payment</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
