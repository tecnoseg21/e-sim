<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Costa Rica - Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.paypal.com/sdk/js?client-id=Adk_bp6_mlm6_gz2j1KU6VJMQKTNhJrTsI9DL5fAwAeLDvxM3wD7DdKQHfniB1pKdQhRvUryjwldMyMV&currency=USD"></script>
</head>
<body>

    <div class="mobile-app-card">
        <header class="header-paisa">
            <div class="language-switcher">
                <span class="lang-opt active">EN</span>
                <span class="lang-opt">ES</span>
                <span class="lang-opt">FR</span>
                <span class="lang-opt">DE</span>
                <span class="lang-opt">NL</span>
            </div>
            <div class="header-overlay">
                <h1>eSIM Costa Rica</h1>
                <div class="badge-unlimited">
                    <i class="fas fa-bolt"></i>
                    <span>Unlimited internet nationwide</span>
                </div>
            </div>
        </header>

        <div class="form-container">
            
            <div class="section-group">
                <label>Select your travel dates</label>
                <div class="date-range-container" style="display: flex; gap: 10px;">
                    <div class="input-box" style="flex: 1;">
                        <small style="display:block; font-size: 0.7rem; color: #1976d2; font-weight: bold;">Start Date</small>
                        <input type="date" id="fecha-inicio">
                    </div>
                    <div class="input-box" style="flex: 1;">
                        <small style="display:block; font-size: 0.7rem; color: #1976d2; font-weight: bold;">End Date</small>
                        <input type="date" id="fecha-fin">
                    </div>
                </div>
                <div id="resumen-dias" style="margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #1976d2;">
                    Total: <span id="contador-dias">0</span> days
                </div>
            </div>

            <div class="section-group">
                <label id="label-contacto">WhatsApp or Email (for activation code):</label>
                <div class="input-box">
                    <input type="text" id="contacto-cliente" placeholder="+506 ... or email@test.com">
                </div>
            </div>

            <div class="compatibility-box">
                <div class="comp-header">
                    <i class="fas fa-info-circle"></i>
                    <label>Is my phone compatible?</label>
                </div>
                <p>Dial <strong>*#06#</strong> on your phone.</p>
                <p class="comp-step">If an <strong>EID</strong> code appears, you're ready.</p>
            </div>

            <div class="section-group">
                <label>Payment Method</label>
                <div class="payment-grid" id="payment-options">
                    <div class="pay-method" data-method="PayPal">
                        <i class="fab fa-paypal"></i>
                        <span>PayPal</span>
                    </div>
                    <div class="pay-method" data-method="Card">
                        <i class="fas fa-credit-card"></i>
                        <span>Card</span>
                    </div>
                </div>
            </div>

            <div class="price-tag" id="display-precio">
                Total: $0.00
            </div>
            
            <div id="action-area">
                <button class="btn-activar" id="btn-validar">CHECKOUT</button>
                <div id="paypal-button-container" style="display: none; margin-top: 15px;"></div>
            </div>

            <div class="service-footer">
                <div class="service-item">
                    <i class="fas fa-check-circle"></i>
                    <span>Instant Delivery</span>
                </div>
                <div class="service-item">
                    <i class="fas fa-shield-alt"></i>
                    <span>Secure Payment</span>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
