<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Costa Rica - Activación</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>

    <div class="mobile-app-card">
        
        <header class="header-paisa">
            <div class="header-overlay">
                <div class="flag-circle">
                    <img src="https://upload.wikimedia.org/wikipedia/commons/f/f2/Flag_of_Costa_Rica.svg" alt="CR Flag">
                </div>
                <h1>eSIM Costa Rica</h1>
                <div class="badge-unlimited">
                    <i class="fas fa-chart-line"></i>
                    <span>Internet ilimitado en todo el país</span>
                </div>
            </div>
        </header>

        <main class="form-container">
            <div class="input-group">
                <label>Selecciona tus días</label>
                <div class="input-box">
                    <input type="number" id="days" value="7" placeholder="¿Cuántos días necesitas?">
                </div>
            </div>

            <div class="price-tag">
                Total: $49.00
            </div>

            <button class="btn-activar">
                ACTIVAR eSIM
            </button>

            <footer class="service-footer">
                <div class="service-item">
                    <i class="fas fa-headset"></i>
                    <div>
                        <strong>24/7</strong>
                        <span>Autoservicio</span>
                    </div>
                </div>
                <div class="service-item">
                    <i class="fas fa-user-cog"></i>
                    <div>
                        <span>Ayuda del</span>
                        <strong>Técnico</strong>
                    </div>
                </div>
            </footer>
        </main>
    </div>

</body>
</html>
