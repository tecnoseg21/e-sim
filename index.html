<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>eSIM Costa Rica - Checkout</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <script src="https://www.paypal.com/sdk/js?client-id=Adk_bp6_mlm6_gz2j1KU6VJMQKTNhJrTsI9DL5fAwAeLDvxM3wD7DdKQHfniB1pKdQhRvUryjwldMyMV&currency=USD&components=buttons,applepay"></script>
</head>
<body>

    <div class="mobile-app-card">
        <header class="header-paisa">
            <div class="language-switcher">
                <span class="lang-opt active" data-lang="EN">EN</span>
                <span class="lang-opt" data-lang="ES">ES</span>
                <span class="lang-opt" data-lang="FR">FR</span>
                <span class="lang-opt" data-lang="DE">DE</span>
                <span class="lang-opt" data-lang="NL">NL</span>
            </div>
            <div class="header-overlay">
                <h1 id="main-title">eSIM Costa Rica</h1>
                <div class="badge-unlimited">
                    <i class="fas fa-bolt"></i>
                    <span id="badge-text">Unlimited internet nationwide</span>
                </div>
            </div>
        </header>

        <div class="form-container">
            
            <div class="section-group">
                <label id="label-dates">Select your travel dates</label>
                <div class="date-range-container" style="display: flex; gap: 10px;">
                    <div class="input-box" style="flex: 1;">
                        <small id="label-start" style="display:block; font-size: 0.7rem; color: #1976d2; font-weight: bold;">Start Date</small>
                        <input type="date" id="fecha-inicio">
                    </div>
                    <div class="input-box" style="flex: 1;">
                        <small id="label-end" style="display:block; font-size: 0.7rem; color: #1976d2; font-weight: bold;">End Date</small>
                        <input type="date" id="fecha-fin">
                    </div>
                </div>
                <div id="resumen-dias" style="margin-top: 10px; font-size: 0.9rem; font-weight: bold; color: #1976d2;">
                    <span id="txt-total-days">Total:</span> <span id="contador-dias">0</span> <span id="txt-days-unit">days</span>
                </div>
            </div>

            <div class="section-group">
                <label id="label-contacto">WhatsApp or Email (for activation code):</label>
                <div class="input-box">
                    <input type="text" id="contacto-cliente" placeholder="+506 ... or email@test.com">
                </div>
            </div>

            <div class="compatibility-box">
                <div class="comp-header">
                    <i class="fas fa-info-circle"></i>
                    <label id="label-comp">Is my phone compatible?</label>
                </div>
                <p id="comp-p1">Dial <strong>*#06#</strong> on your phone.</p>
                <p class="comp-step" id="comp-p2">If an <strong>EID</strong> code appears, you're ready.</p>
            </div>

            <div id="payment-area" style="display: none;">
                <div class="price-tag" id="display-precio" style="margin-bottom: 10px;">
                    Total: $0.00
                </div>
                <div id="paypal-button-container"></div>
            </div>
            
            <div id="action-area">
                <button class="btn-activar" id="btn-validar">CHECKOUT</button>
            </div>

            <div class="service-footer">
                <div class="service-item">
                    <i class="fas fa-check-circle"></i>
                    <span id="footer-1">Instant Delivery</span>
                </div>
                <div class="service-item">
                    <i class="fas fa-shield-alt"></i>
                    <span id="footer-2">Secure Payment</span>
                </div>
            </div>
        </div>
    </div>

    <script>
        const preciosPorDia = { 1: 15, 3: 25, 7: 49, 15: 65, 30: 89 };
        let currentLang = 'EN';

        const translations = {
            EN: { 
                total: "Total to pay: $", 
                errorContact: "Enter WhatsApp/Email", 
                errorDates: "Please select valid dates", 
                duration: "Duration: ", 
                days: " days",
                checkout: "CHECKOUT",
                labelDates: "Select your travel dates",
                labelContact: "WhatsApp or Email (for activation code):",
                footer1: "Instant Delivery",
                footer2: "Secure Payment"
            },
            ES: { 
                total: "Total a pagar: $", 
                errorContact: "Ingresa WhatsApp/Correo", 
                errorDates: "Por favor selecciona fechas válidas", 
                duration: "Duración: ", 
                days: " días",
                checkout: "FINALIZAR COMPRA",
                labelDates: "Selecciona las fechas de tu viaje",
                labelContact: "WhatsApp o Correo (para código de activación):",
                footer1: "Entrega Instantánea",
                footer2: "Pago Seguro"
            }
        };

        // 1. MANEJO DE IDIOMAS
        document.querySelectorAll('.lang-opt').forEach(opt => {
            opt.addEventListener('click', function() {
                document.querySelectorAll('.lang-opt').forEach(el => el.classList.remove('active'));
                this.classList.add('active');
                
                currentLang = this.getAttribute('data-lang') || this.textContent.trim();
                updateUI();
            });
        });

        function updateUI() {
            const lang = translations[currentLang] || translations['EN'];
            document.getElementById('btn-validar').textContent = lang.checkout;
            document.getElementById('label-dates').textContent = lang.labelDates;
            document.getElementById('label-contacto').textContent = lang.labelContact;
            document.getElementById('footer-1').textContent = lang.footer1;
            document.getElementById('footer-2').textContent = lang.footer2;
            document.getElementById('txt-total-days').textContent = "Total:";
            document.getElementById('txt-days-unit').textContent = lang.days.trim();
            calcularPrecio();
        }

        function calcularPrecio() {
            const inicio = document.querySelector('#fecha-inicio').value;
            const fin = document.querySelector('#fecha-fin').value;
            const displayPrecio = document.querySelector('#display-precio');
            const contadorDiasSpan = document.querySelector('#contador-dias');

            if (inicio && fin) {
                const d1 = new Date(inicio);
                const d2 = new Date(fin);
                if (d2 >= d1) {
                    const dias = Math.ceil(Math.abs(d2 - d1) / (1000 * 60 * 60 * 24)) + 1;
                    if (contadorDiasSpan) contadorDiasSpan.textContent = dias;
                    
                    let precio = preciosPorDia[dias] || (dias * 7);
                    const lang = translations[currentLang] || translations['EN'];
                    
                    displayPrecio.innerHTML = `<small style="font-size:0.8rem; display:block; opacity:0.8;">${lang.duration}${dias}${lang.days}</small> ${lang.total}${precio.toFixed(2)}`;
                    
                    return precio;
                }
            }
            return 0;
        }

        // 2. LÓGICA DEL BOTÓN CHECKOUT
        document.getElementById('btn-validar').addEventListener('click', function(e) {
            const monto = calcularPrecio();
            const contacto = document.querySelector('#contacto-cliente').value;
            const paymentArea = document.getElementById('payment-area');

            const lang = translations[currentLang] || translations['EN'];

            if (monto <= 0) return alert(lang.errorDates);
            if (!contacto || contacto.trim() === "") return alert(lang.errorContact);

            // Ocultar botón de validación y mostrar área de pago
            this.style.display = 'none';
            paymentArea.style.display = 'block';
            
            initPayPal(monto, contacto);
        });

        function initPayPal(monto, contacto) {
            const container = document.getElementById('paypal-button-container');
            container.innerHTML = ''; 

            paypal.Buttons({
                style: { layout: 'vertical', color: 'gold', shape: 'rect', label: 'pay' },
                createOrder: function(data, actions) {
                    return actions.order.create({
                        purchase_units: [{
                            amount: { value: monto.toString() },
                            description: `eSIM Monteverde - ${contacto}`
                        }]
                    });
                },
                onApprove: function(data, actions) {
                    return actions.order.capture().then(details => {
                        const lang = translations[currentLang] || translations['EN'];
                        alert(currentLang === 'ES' ? "¡Pago exitoso! Revisa tu contacto." : "Payment successful! Check your contact.");
                        window.location.reload();
                    });
                }
            }).render('#paypal-button-container');
        }

        // Escuchar cambios en fechas para actualizar el contador de días pequeño
        document.getElementById('fecha-inicio').addEventListener('change', calcularPrecio);
        document.getElementById('fecha-fin').addEventListener('change', calcularPrecio);
    </script>
</body>
</html>
